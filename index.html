<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="J Fragance - Catálogo exclusivo de perfumes de lujo. Descubre nuestra colección premium de fragancias para mujer y hombre.">
    <meta name="theme-color" content="#0a0a0f">
    
    <title>J Fragance | Perfumes de Lujo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --color-primary: #d4af37;
            --color-primary-light: #e8c860;
            --color-primary-dark: #b8962e;
            --color-text: #f5f5f5;
            --color-text-muted: #8a8a8a;
            --color-bg: #0a0a0f;
            --color-bg-card: rgba(255, 255, 255, 0.03);
            --color-border: rgba(255, 255, 255, 0.08);
            --color-border-hover: rgba(255, 255, 255, 0.15);
            
            --font-display: 'Cormorant Garamond', Georgia, serif;
            --font-body: 'Montserrat', Arial, sans-serif;
            
            --transition-smooth: 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --transition-fast: 0.3s ease;
            --transition-slow: 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            
            --shadow-card: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 60px rgba(212, 175, 55, 0.15);
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        body {
            font-family: var(--font-body);
            background: var(--color-bg);
            color: var(--color-text);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ============================================
           BACKGROUND EFFECTS
           ============================================ */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: -3;
            background: var(--color-bg);
        }

        .bg-gradient {
            position: fixed;
            inset: 0;
            z-index: -2;
            opacity: 0.6;
            transition: background var(--transition-slow);
        }

        .bg-particles {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--color-primary);
            border-radius: 50%;
            opacity: 0;
            animation: float-particle 15s infinite;
        }

        @keyframes float-particle {
            0%, 100% { 
                opacity: 0; 
                transform: translateY(100vh) scale(0); 
            }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { 
                opacity: 0; 
                transform: translateY(-10vh) scale(1); 
            }
        }

        .noise {
            position: fixed;
            inset: 0;
            z-index: -1;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        /* ============================================
           HEADER
           ============================================ */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 1.5rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, rgba(10,10,15,0.9) 0%, transparent 100%);
            transition: all var(--transition-fast);
        }

        .header.scrolled {
            background: rgba(10,10,15,0.95);
            backdrop-filter: blur(20px);
            padding: 1rem 4rem;
            border-bottom: 1px solid var(--color-border);
        }

        .logo {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 0.3em;
            color: var(--color-text);
            text-decoration: none;
        }

        .logo span {
            color: var(--color-primary);
            font-weight: 500;
        }

        .nav-list {
            display: flex;
            gap: 3rem;
            list-style: none;
        }

        .nav-link {
            color: var(--color-text-muted);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            position: relative;
            transition: color var(--transition-fast);
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--color-primary);
            transition: width var(--transition-fast);
        }

        .nav-link:hover {
            color: var(--color-text);
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .nav-link.whatsapp {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--color-primary);
        }

        .nav-link.whatsapp svg {
            width: 16px;
            height: 16px;
        }

        /* ============================================
           HERO / CAROUSEL
           ============================================ */
        .hero {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            perspective: 2000px;
            z-index: 100;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .hero.hidden {
            opacity: 0;
            transform: translateY(-30px);
            pointer-events: none;
        }

        .hero-title {
            position: absolute;
            top: 3%;
            text-align: center;
            z-index: 10;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.8s ease;
            padding: 1rem 2rem;
        }

        .hero.hidden .hero-title {
            opacity: 0;
            transform: translateY(-20px);
        }

        .hero-title h1 {
            font-family: var(--font-display);
            font-size: clamp(1.8rem, 5vw, 3.5rem);
            font-weight: 300;
            letter-spacing: 0.3em;
            margin-bottom: 0.3rem;
            background: linear-gradient(135deg, var(--color-text) 0%, var(--color-primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-title p {
            font-size: 0.65rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--color-text-muted);
        }

        .carousel-wrapper {
            position: relative;
            width: 100%;
            max-width: 1400px;
            height: 50vh;
            min-height: 400px;
            margin-top: 5rem;
            transform-style: preserve-3d;
        }

        .carousel {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        .perfume-card {
            position: absolute;
            width: 280px;
            height: 420px;
            left: 50%;
            top: 45%;
            transform: translate(-50%, -50%) translateX(0) rotateY(0deg);
            transform-style: preserve-3d;
            transition: all 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
        }

        .perfume-card.active {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) translateX(0) rotateY(0deg) scale(1);
            z-index: 10;
        }

        .perfume-card.prev {
            opacity: 0.5;
            visibility: visible;
            transform: translate(-50%, -50%) translateX(-280px) rotateY(25deg) scale(0.85);
            z-index: 5;
        }

        .perfume-card.next {
            opacity: 0.5;
            visibility: visible;
            transform: translate(-50%, -50%) translateX(280px) rotateY(-25deg) scale(0.85);
            z-index: 5;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            background: var(--color-bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--color-border);
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            transition: all var(--transition-fast);
            box-shadow: var(--shadow-card);
        }

        .card-inner::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 24px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%, rgba(212,175,55,0.1) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .perfume-card:hover .card-inner {
            border-color: var(--color-border-hover);
            box-shadow: var(--shadow-card), var(--shadow-glow);
            transform: translateY(-8px);
        }

        .card-image {
            position: relative;
            width: 100%;
            height: 60%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .card-image::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.3) 100%);
            pointer-events: none;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 1.5rem;
            transition: transform 0.6s ease;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.4));
        }

        .perfume-card:hover .card-image img {
            transform: scale(1.08) translateY(-5px);
        }

        /* 3D Sheen Effect */
        .sheen {
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(
                120deg,
                transparent 0%,
                transparent 30%,
                rgba(255,255,255,0.15) 45%,
                rgba(255,255,255,0.25) 50%,
                rgba(255,255,255,0.15) 55%,
                transparent 70%,
                transparent 100%
            );
            transform: skewX(-20deg);
            animation: sheen-move 6s infinite;
            pointer-events: none;
            z-index: 5;
        }

        @keyframes sheen-move {
            0%, 100% { left: -60%; }
            50% { left: 120%; }
        }

        .perfume-card:hover .sheen {
            animation-duration: 3s;
        }

        .card-content {
            position: relative;
            padding: 1.25rem;
            text-align: center;
            z-index: 2;
        }

        .card-brand {
            font-size: 0.65rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--color-primary);
            margin-bottom: 0.4rem;
        }

        .card-name {
            font-family: var(--font-display);
            font-size: 1.6rem;
            font-weight: 400;
            margin-bottom: 0.4rem;
            color: var(--color-text);
        }

        .card-price {
            font-family: var(--font-display);
            font-size: 1.3rem;
            color: var(--color-text-muted);
            margin-top: 0.5rem;
        }

        /* ============================================
           CONTROLS & INDICATORS
           ============================================ */
        .carousel-controls {
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 2rem;
            z-index: 50;
        }

        .control-btn {
            width: 56px;
            height: 56px;
            border: 1px solid var(--color-border);
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
        }

        .control-btn:hover {
            background: rgba(212, 175, 55, 0.15);
            border-color: var(--color-primary);
            transform: scale(1.08);
        }

        .control-btn svg {
            width: 20px;
            height: 20px;
            stroke: var(--color-text);
            stroke-width: 1.5;
            fill: none;
        }

        .indicators {
            position: absolute;
            bottom: 4%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 0.75rem;
            z-index: 50;
        }

        .indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .indicator.active {
            background: var(--color-primary);
            transform: scale(1.3);
            box-shadow: 0 0 12px var(--color-primary);
        }

        .indicator:hover:not(.active) {
            background: rgba(255,255,255,0.4);
        }

        /* Scroll Indicator */
        .scroll-hint {
            position: absolute;
            bottom: 2rem;
            right: 3rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            animation: bounce-hint 2s infinite;
            z-index: 50;
        }

        .scroll-hint span {
            font-size: 0.7rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--color-text-muted);
        }

        .scroll-hint svg {
            width: 20px;
            height: 20px;
            stroke: var(--color-primary);
            stroke-width: 1.5;
            fill: none;
            animation: arrow-bounce 2s infinite;
        }

        @keyframes arrow-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(6px); }
        }

        .hero.hidden .scroll-hint {
            opacity: 0;
            animation: none;
        }

        /* ============================================
           GALLERY SECTION
           ============================================ */
        .gallery {
            position: relative;
            min-height: 100vh;
            padding: 8rem 2rem 4rem;
            margin-top: 100vh;
            background: linear-gradient(180deg, rgba(10,10,15,0.97) 0%, rgba(15,15,20,0.98) 100%);
            border-top: 1px solid var(--color-border);
        }

        .gender-section {
            max-width: 1400px;
            margin: 0 auto 4rem;
        }

        .gender-section:last-child {
            margin-bottom: 0;
        }

        .section-header {
            text-align: center;
            margin-bottom: 3rem;
            position: relative;
        }

        .section-header::after {
            content: '';
            position: absolute;
            bottom: -1rem;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--color-primary), transparent);
        }

        .section-title {
            font-family: var(--font-display);
            font-size: 2.2rem;
            font-weight: 400;
            letter-spacing: 0.2em;
            color: var(--color-text);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .gallery-item {
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            transition: all var(--transition-fast);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .gallery-item::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(212,175,55,0.03) 100%);
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .gallery-item:hover {
            background: rgba(255,255,255,0.06);
            border-color: var(--color-border-hover);
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .gallery-item:hover::before {
            opacity: 1;
        }

        .gallery-item img {
            width: 100%;
            height: 140px;
            object-fit: contain;
            margin-bottom: 1rem;
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.3));
            transition: transform var(--transition-fast);
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        .gallery-brand {
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--color-primary);
            margin-bottom: 0.3rem;
        }

        .gallery-name {
            font-family: var(--font-display);
            font-size: 1.15rem;
            font-weight: 400;
            color: var(--color-text);
            margin-bottom: 0.3rem;
        }

        .gallery-price {
            font-family: var(--font-display);
            font-size: 1rem;
            color: var(--color-text-muted);
        }

        /* ============================================
           FOOTER
           ============================================ */
        .footer {
            padding: 3rem 2rem;
            text-align: center;
            border-top: 1px solid var(--color-border);
            background: rgba(5,5,10,0.9);
        }

        .footer-text {
            font-size: 0.75rem;
            color: var(--color-text-muted);
            letter-spacing: 0.1em;
        }

        /* ============================================
           MODAL
           ============================================ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: rgba(5, 5, 10, 0.85);
            backdrop-filter: blur(10px);
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            position: relative;
            width: 100%;
            max-width: 480px;
            background: linear-gradient(145deg, rgba(30,30,40,0.98) 0%, rgba(20,20,30,0.98) 100%);
            border: 1px solid var(--color-border);
            border-radius: 24px;
            padding: 2.5rem;
            transform: scale(0.9) translateY(20px);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 80px rgba(212,175,55,0.1);
        }

        .modal-overlay.active .modal {
            transform: scale(1) translateY(0);
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 40px;
            height: 40px;
            border: none;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
        }

        .modal-close:hover {
            background: rgba(255,255,255,0.1);
            transform: rotate(90deg);
        }

        .modal-close svg {
            width: 20px;
            height: 20px;
            stroke: var(--color-text-muted);
            stroke-width: 2;
        }

        .modal-image {
            width: 100%;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            background: rgba(255,255,255,0.02);
            border-radius: 16px;
            overflow: hidden;
        }

        .modal-image img {
            max-width: 80%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.4));
        }

        .modal-brand {
            font-size: 0.7rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--color-primary);
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .modal-name {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 400;
            text-align: center;
            margin-bottom: 0.5rem;
            color: var(--color-text);
        }

        .modal-price {
            font-family: var(--font-display);
            font-size: 1.5rem;
            text-align: center;
            color: var(--color-text-muted);
            margin-bottom: 2rem;
        }

        .modal-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
            padding: 1rem 2rem;
            border: none;
            border-radius: 12px;
            font-family: var(--font-body);
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .modal-btn.whatsapp {
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
            color: #0a0a0f;
        }

        .modal-btn.whatsapp:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }

        .modal-btn svg {
            width: 20px;
            height: 20px;
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 1024px) {
            .header {
                padding: 1.25rem 2rem;
            }
            
            .nav-list {
                gap: 2rem;
            }
            
            .carousel-wrapper {
                max-width: 900px;
                margin-top: 4rem;
            }
            
            .hero-title {
                top: 2%;
            }
            
            .perfume-card {
                width: 240px;
                height: 360px;
                top: 42%;
            }
            
            .perfume-card.prev {
                transform: translate(-50%, -50%) translateX(-180px) rotateY(25deg) scale(0.75);
            }
            
            .perfume-card.next {
                transform: translate(-50%, -50%) translateX(180px) rotateY(-25deg) scale(0.75);
            }
        }

        @media (max-width: 768px) {
            .header {
                padding: 1rem 1.5rem;
            }
            
            .nav-list {
                gap: 1.5rem;
            }
            
            .nav-link {
                font-size: 0.65rem;
            }
            
            .hero-title h1 {
                font-size: 1.8rem;
                letter-spacing: 0.15em;
            }
            
            .hero-title {
                top: 2%;
            }
            
            .carousel-wrapper {
                height: 40vh;
                margin-top: 3rem;
            }
            
            .perfume-card {
                width: 200px;
                height: 300px;
                top: 40%;
            }
            
            .perfume-card.prev {
                transform: translate(-50%, -50%) translateX(-120px) rotateY(20deg) scale(0.7);
            }
            
            .perfume-card.next {
                transform: translate(-50%, -50%) translateX(120px) rotateY(-20deg) scale(0.7);
            }
            
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }
            
            .gallery-item {
                padding: 1rem;
            }
            
            .scroll-hint {
                right: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .logo {
                font-size: 1.4rem;
                letter-spacing: 0.2em;
            }

                if (card.classList.contains('active')) {
                    openModal(perfume);
                } else {
                    navigate(index < currentIndex ? -1 : 1);
                }
            });

            return card;
        }

        function createIndicators() {
            carouselPerfumes.forEach((_, index) => {
                const indicator = document.createElement('button');
                indicator.className = 'indicator' + (index === 0 ? ' active' : '');
                indicator.setAttribute('aria-label', `Ir a perfume ${index + 1}`);
                indicator.addEventListener('click', () => {
                    const diff = index - currentIndex;
                    if (diff !== 0) navigate(diff);
                });
                indicatorsContainer.appendChild(indicator);
            });
        }

        function updateCarousel() {
            const cards = carousel.querySelectorAll('.perfume-card');
            
            cards.forEach((card, index) => {
                card.classList.remove('active', 'prev', 'next');
                
                const diff = (index - currentIndex + carouselPerfumes.length) % carouselPerfumes.length;
                
                if (diff === 0) {
                    card.classList.add('active');
                } else if (diff === 1) {
                    card.classList.add('next');
                } else if (diff === carouselPerfumes.length - 1) {
                    card.classList.add('prev');
                }
            });

            // Update indicators
            const indicators = indicatorsContainer.querySelectorAll('.indicator');
            indicators.forEach((ind, index) => {
                ind.classList.toggle('active', index === currentIndex);
                ind.setAttribute('aria-current', index === currentIndex ? 'true' : 'false');
            });

            // Update background
            bgGradient.style.background = carouselPerfumes[currentIndex].gradient;
        }

        function navigate(direction) {
            currentIndex = (currentIndex + direction + carouselPerfumes.length) % carouselPerfumes.length;
            updateCarousel();
        }

        // ============================================
        // GALLERY
        // ============================================
        function createGallery() {
            const galleryMujer = document.getElementById('galleryMujer');
            const galleryHombre = document.getElementById('galleryHombre');
            
            const svgFallback = `<svg viewBox="0 0 200 320" xmlns="http://www.w3.org/2000/svg">
                <rect x="55" y="15" width="90" height="60" rx="8" fill="#d4af37"/>
                <rect x="70" y="70" width="60" height="12" rx="3" fill="#d4af37"/>
                <path d="M45 82 L155 82 L150 265 Q150 285 130 285 L70 285 Q50 285 50 265 Z" fill="rgba(255,255,255,0.15)"/>
            </svg>`;
            
            allPerfumes.forEach((perfume) => {
                const item = document.createElement('article');
                item.className = 'gallery-item';
                item.dataset.perfume = JSON.stringify(perfume);
                
                const imagePath = getPerfumeImage(perfume.name, perfume.brand, perfume.gender);
                
                item.innerHTML = `
                    <img src="${imagePath}" alt="${perfume.name}" 
                         loading="lazy"
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" />
                    <div style="display:none;">${svgFallback}</div>
                    <p class="gallery-brand">${perfume.brand}</p>
                    <h3 class="gallery-name">${perfume.name}</h3>
                    <p class="gallery-price">${perfume.price}</p>
                `;

                item.addEventListener('click', () => openModal(perfume));
                
                if (perfume.gender === 'mujer') {
                    galleryMujer.appendChild(item);
                } else {
                    galleryHombre.appendChild(item);
                }
            });
        }

        // ============================================
        // MODAL
        // ============================================
        const modalOverlay = document.getElementById('modalOverlay');
        const modalImage = document.getElementById('modalImage');
        const modalBrand = document.getElementById('modalBrand');
        const modalName = document.getElementById('modalName');
        const modalPrice = document.getElementById('modalPrice');
        const modalWhatsapp = document.getElementById('modalWhatsapp');
        const modalClose = document.getElementById('modalClose');

        function openModal(perfume) {
            const imagePath = getPerfumeImage(perfume.name, perfume.brand, perfume.gender);
            modalImage.src = imagePath;
            modalImage.alt = perfume.name;
            modalBrand.textContent = perfume.brand;
            modalName.textContent = perfume.name;
            modalPrice.textContent = perfume.price;
            
            const message = encodeURIComponent(`Hola! Me interesa el perfume ${perfume.name} - ${perfume.brand} (${perfume.price})`);
            modalWhatsapp.href = `https://api.whatsapp.com/send?phone=573194284340&text=${message}`;
            
            modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        modalClose.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
                closeModal();
            }
        });

        // ============================================
        // SCROLL EFFECTS
        // ============================================
        let lastScrollY = window.scrollY;

        window.addEventListener('scroll', () => {
            const currentScrollY = window.scrollY;
            
            // Hero hide/show
            if (currentScrollY > 100) {
                hero.classList.add('hidden');
            } else {
                hero.classList.remove('hidden');
            }

            // Header effect
            if (currentScrollY > 50) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
            
            lastScrollY = currentScrollY;
        });

        // ============================================
        // INITIALIZATION
        // ============================================
        function init() {
            // Carousel
            carouselPerfumes.forEach((perfume, index) => {
                carousel.appendChild(createPerfumeCard(perfume, index));
            });

            createIndicators();
            updateCarousel();

            // Initial background
            bgGradient.style.background = carouselPerfumes[0].gradient;

            // Gallery
            createGallery();

            // Show hero title
            setTimeout(() => {
                document.querySelector('.hero-title').style.opacity = '1';
                document.querySelector('.hero-title').style.transform = 'translateY(0)';
            }, 300);
        }

        // Event listeners
        document.getElementById('prevBtn').addEventListener('click', () => navigate(-1));
        document.getElementById('nextBtn').addEventListener('click', () => navigate(1));

        // Touch/swipe support
        let touchStartX = 0;
        let touchEndX = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        document.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            const diff = touchStartX - touchEndX;
            if (Math.abs(diff) > 50) {
                navigate(diff > 0 ? 1 : -1);
            }
        }, { passive: true });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') navigate(-1);
            if (e.key === 'ArrowRight') navigate(1);
        });

        // Run
        init();
    </script>
</body>
</html>
